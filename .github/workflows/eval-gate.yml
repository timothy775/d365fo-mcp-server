name: eval-gate

# Regression gate for the agent eval loop (docs/AGENT_EVAL_LOOP.md Phase 3) plus
# the full unit suite. VM-free: builds the server, runs every test (including the
# golden-integrity gate tests/eval/goldens.test.ts and the oracle/improver units),
# so a malformed golden commit or a normalizer regression fails here.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  NODE_VERSION: '24.x'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Type-check / build
        run: npm run build

      # `npm test` is vitest in watch mode — use the one-shot runner for CI.
      - name: Unit tests + golden regression gate
        run: npx vitest run

      # Knowledge content is gated the same fail-closed way generated code is:
      # every named AOT type/API in KNOWLEDGE_BASE must be covered by a
      # snapshot captured against the real symbol index on the VM (ROADMAP P1).
      - name: Knowledge audit (snapshot verify)
        run: npm run eval:knowledge-audit

      # Published reliability metric: a new AOT type or topic without K∧E∧T
      # visibly drops the number, and stale artifacts fail the build (P4).
      - name: Coverage matrix up to date
        run: npm run eval:coverage -- --check

      - name: Eval scoreboard (informational)
        if: always()
        run: npm run eval:report || true
