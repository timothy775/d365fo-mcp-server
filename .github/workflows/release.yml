name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Create release package
        run: |
          mkdir -p release
          cp -r dist package.json package-lock.json README.md LICENSE startup.sh release/
          cd release
          tar -czf ../d365fo-mcp-server-${{ github.ref_name }}.tar.gz .
          cd ..
          zip -r d365fo-mcp-server-${{ github.ref_name }}.zip release/

      - name: Generate changelog
        id: changelog
        run: |
          echo "## What's Changed" > CHANGELOG.md
          git log $(git describe --tags --abbrev=0 HEAD^)..HEAD --pretty=format:"- %s (%h)" >> CHANGELOG.md

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            d365fo-mcp-server-${{ github.ref_name }}.tar.gz
            d365fo-mcp-server-${{ github.ref_name }}.zip
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Publishes the CLI/server package as `d365fo-mcp` so `npx d365fo-mcp` works.
  # Requires the NPM_TOKEN repository secret (npm automation token); the job
  # skips gracefully while the secret is not configured.
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # npm --provenance
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24.x'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Sync package version with the tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CURRENT=$(node -p "require('./package.json').version")
          if [ "$CURRENT" != "$TAG_VERSION" ]; then
            npm version --no-git-tag-version "$TAG_VERSION"
          fi

      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN secret not set — skipping npm publish."
            exit 0
          fi
          npm publish --provenance --access public
