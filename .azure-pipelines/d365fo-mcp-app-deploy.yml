# Azure Pipeline — Deploy MCP Server Application to App Service
#
# Compiles better-sqlite3 on ubuntu-latest (same Linux base as App Service)
# with the same Node.js version as the App Service runtime.
# Ships pre-built node_modules so no compilation is needed on the server.

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'startup.sh'
      - 'tsconfig.json'
      - '.azure-pipelines/d365fo-mcp-app-deploy.yml'

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: xpp-mcp-server-config
  - name: nodeVersion
    value: '24.x'
  - name: MCP_SERVER_PATH
    value: '$(Pipeline.Workspace)/mcp-server'

stages:
  - stage: Build
    displayName: 'Build'
    jobs:
      - job: BuildJob
        displayName: 'Compile and package'
        steps:
          - checkout: self
            displayName: 'Checkout MCP Server from GitHub'
            path: mcp-server
            clean: true

          - task: NodeTool@0
            displayName: 'Use Node.js $(nodeVersion)'
            inputs:
              versionSpec: $(nodeVersion)

          # npm ci compiles better-sqlite3 from source on ubuntu-latest.
          # ubuntu-latest uses the same glibc as App Service Linux, so the
          # resulting binary works at runtime without any rebuild step.
          - script: npm ci
            displayName: 'npm ci (compiles native addons for Node 24 / Linux)'
            workingDirectory: '$(MCP_SERVER_PATH)'

          - script: npm run build
            displayName: 'TypeScript compile → dist/'
            workingDirectory: '$(MCP_SERVER_PATH)'

          # Archive everything the server needs to run.
          # node_modules ARE included (pre-built for Node 24 / Linux).
          # Source files, tests, and build tooling are excluded to keep zip small.
          - task: ArchiveFiles@2
            displayName: 'Create deployment zip'
            inputs:
              rootFolderOrFile: '$(MCP_SERVER_PATH)'
              includeRootFolder: false
              archiveType: zip
              archiveFile: '$(Build.ArtifactStagingDirectory)/app.zip'
              replaceExistingArchive: true

          - task: PublishBuildArtifacts@1
            displayName: 'Publish artifact'
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)/app.zip'
              ArtifactName: 'app'
              publishLocation: Container

  - stage: Deploy
    displayName: 'Deploy to App Service'
    dependsOn: Build
    jobs:
      - deployment: DeployJob
        displayName: 'Deploy'
        environment: 'production'
        strategy:
          runOnce:
            deploy:
              steps:
                # Pre-built node_modules are shipped in the zip — disable Oryx
                # so it does not run a second npm ci on the server.
                - task: AzureAppServiceSettings@1
                  displayName: 'Set SCM_DO_BUILD_DURING_DEPLOYMENT=false'
                  inputs:
                    azureSubscription: '$(AZURE_SUBSCRIPTION)'
                    appName: '$(AZURE_APP_SERVICE_NAME)'
                    appSettings: |
                      [
                        { "name": "SCM_DO_BUILD_DURING_DEPLOYMENT", "value": "false" },
                        { "name": "WEBSITE_NODE_DEFAULT_VERSION", "value": "~24" },
                        { "name": "MCP_SERVER_MODE", "value": "read-only" }
                      ]

                - task: AzureRmWebAppDeployment@4
                  displayName: 'Deploy zip to App Service'
                  inputs:
                    ConnectionType: AzureRM
                    azureSubscription: '$(AZURE_SUBSCRIPTION)'
                    appType: webAppLinux
                    WebAppName: '$(AZURE_APP_SERVICE_NAME)'
                    packageForLinux: '$(Pipeline.Workspace)/app/app.zip'
                    RuntimeStack: 'NODE|24-lts'
                    StartupCommand: 'bash startup.sh'
                    deployToSlotOrASE: false
                    enableCustomDeployment: true
                    DeploymentType: zipDeploy

                # Poll /health until the app responds 200 or timeout (10 min).
                # In read-only mode the app downloads the SQLite metadata DB from
                # Azure Blob Storage (300–600 MB) before opening the HTTP port —
                # this typically takes 2–5 minutes on a cold start.
                - script: |
                    HEALTH_URL="https://$(AZURE_APP_SERVICE_NAME).azurewebsites.net/health"
                    echo "Waiting 30 s for App Service restart before polling..."
                    sleep 30
                    echo "Polling $HEALTH_URL (max 10 min, every 15 s)..."
                    for i in $(seq 1 40); do
                      STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL")
                      echo "Attempt $i/40: HTTP $STATUS"
                      if [ "$STATUS" = "200" ]; then
                        echo "✅ Health check passed."
                        exit 0
                      fi
                      sleep 15
                    done
                    echo "❌ Health check FAILED — app did not respond with HTTP 200 within 10 minutes."
                    echo "   Check App Service logs: az webapp log tail --name $(AZURE_APP_SERVICE_NAME) --resource-group <rg>"
                    exit 1
                  displayName: 'Health check — verify /health returns 200 (10 min timeout)'
